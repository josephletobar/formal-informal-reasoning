name: Publication package checks

on:
  push:
    paths:
      - "publication_package/**"
      - "publication_requirements.txt"
      - ".github/workflows/publication-package.yml"
  pull_request:
    paths:
      - "publication_package/**"
      - "publication_requirements.txt"
      - ".github/workflows/publication-package.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install publication-check dependencies
        run: python -m pip install -r publication_requirements.txt
      - name: Recompute headline claims
        run: python publication_package/audit_claims.py
      - name: Run package smoke test
        run: python publication_package/clean_room_smoke.py
      - name: Verify manuscript package
        run: python publication_package/verify_publication_package.py
      - name: Audit Word manuscript structure
        run: python publication_package/audit_submission_docx.py
      - name: Rebuild figures
        run: python publication_package/make_publication_figures.py

  independent-behavioral-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install behavioral-screen dependencies
        run: python -m pip install -r publication_requirements.txt transformers huggingface_hub
      - name: Run public-model behavioral screen
        run: python publication_package/run_independent_behavioral_screen.py --out behavioral_screen
      - name: Upload behavioral-screen results
        uses: actions/upload-artifact@v4
        with:
          name: independent-behavioral-screen
          path: behavioral_screen/
